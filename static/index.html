<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>LLM &amp; Image Generation Playground</title>
  <style>
    :root {
      --bg: #0f1117;
      --panel: #1a1d27;
      --panel-2: #232733;
      --border: #2e3340;
      --text: #e6e8ee;
      --muted: #9aa3b2;
      --accent: #6c8cff;
      --accent-2: #b06cff;
      --ok: #3ecf8e;
      --err: #ff6b6b;
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      font-family: system-ui, -apple-system, "Segoe UI", Roboto, sans-serif;
      background: var(--bg);
      color: var(--text);
      line-height: 1.5;
    }
    header {
      padding: 24px 20px;
      text-align: center;
      border-bottom: 1px solid var(--border);
      background: linear-gradient(120deg, #161922, #1b1430);
    }
    header h1 { margin: 0 0 4px; font-size: 1.5rem; }
    header p { margin: 0; color: var(--muted); font-size: 0.9rem; }
    .container {
      max-width: 1100px;
      margin: 0 auto;
      padding: 20px;
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 20px;
    }
    @media (max-width: 860px) { .container { grid-template-columns: 1fr; } }
    .card {
      background: var(--panel);
      border: 1px solid var(--border);
      border-radius: 14px;
      padding: 20px;
    }
    .card h2 {
      margin: 0 0 16px;
      font-size: 1.15rem;
      display: flex;
      align-items: center;
      gap: 8px;
    }
    .badge {
      font-size: 0.7rem;
      padding: 2px 8px;
      border-radius: 999px;
      background: var(--panel-2);
      color: var(--muted);
      border: 1px solid var(--border);
    }
    label {
      display: block;
      font-size: 0.8rem;
      color: var(--muted);
      margin: 12px 0 6px;
    }
    select, textarea, input {
      width: 100%;
      background: var(--panel-2);
      color: var(--text);
      border: 1px solid var(--border);
      border-radius: 8px;
      padding: 10px 12px;
      font-size: 0.9rem;
      font-family: inherit;
      resize: vertical;
    }
    select:focus, textarea:focus, input:focus {
      outline: none;
      border-color: var(--accent);
    }
    button {
      margin-top: 16px;
      width: 100%;
      padding: 11px;
      border: none;
      border-radius: 8px;
      font-size: 0.95rem;
      font-weight: 600;
      color: white;
      cursor: pointer;
      transition: opacity 0.15s;
    }
    button:disabled { opacity: 0.55; cursor: not-allowed; }
    .btn-chat { background: linear-gradient(120deg, var(--accent), #4a6cff); }
    .btn-image { background: linear-gradient(120deg, var(--accent-2), #8a3cff); }
    .output {
      margin-top: 16px;
      background: var(--panel-2);
      border: 1px solid var(--border);
      border-radius: 8px;
      padding: 14px;
      min-height: 90px;
      white-space: pre-wrap;
      font-size: 0.9rem;
    }
    .output.empty { color: var(--muted); }
    .img-wrap {
      margin-top: 16px;
      background: var(--panel-2);
      border: 1px solid var(--border);
      border-radius: 8px;
      padding: 14px;
      min-height: 120px;
      display: flex;
      align-items: center;
      justify-content: center;
      color: var(--muted);
      font-size: 0.9rem;
    }
    .img-wrap img { max-width: 100%; border-radius: 8px; }
    .err { color: var(--err); }
    .spinner {
      width: 18px; height: 18px;
      border: 2px solid var(--border);
      border-top-color: var(--accent);
      border-radius: 50%;
      display: inline-block;
      animation: spin 0.7s linear infinite;
      vertical-align: middle;
    }
    @keyframes spin { to { transform: rotate(360deg); } }
    .row { display: flex; gap: 12px; }
    .row > div { flex: 1; }
    footer { text-align: center; color: var(--muted); font-size: 0.8rem; padding: 16px; }
  </style>
</head>
<body>
  <header>
    <h1>🧪 LLM &amp; Image Generation Playground</h1>
    <p>Chat with Groq models · Generate images with Google Gemini</p>
  </header>

  <div class="container">
    <!-- ===================== CHAT ===================== -->
    <section class="card">
      <h2>💬 Chatbot <span class="badge">Groq</span></h2>

      <label for="textModel">Text model</label>
      <select id="textModel"></select>

      <label for="systemPrompt">System prompt</label>
      <textarea id="systemPrompt" rows="2"
        placeholder="e.g. You are a helpful assistant that answers concisely."></textarea>

      <label for="userMessage">Your message</label>
      <textarea id="userMessage" rows="4"
        placeholder="Ask anything..."></textarea>

      <button id="sendBtn" class="btn-chat">Send</button>

      <label>Response</label>
      <div id="chatOutput" class="output empty">The model's reply will appear here.</div>
    </section>

    <!-- ===================== IMAGE ===================== -->
    <section class="card">
      <h2>🎨 Image Generation <span class="badge">Gemini</span></h2>

      <label for="imageModel">Image model</label>
      <select id="imageModel"></select>

      <label for="imagePrompt">Image prompt</label>
      <textarea id="imagePrompt" rows="4"
        placeholder="e.g. A watercolor painting of a fox sitting in a snowy forest at dusk."></textarea>

      <button id="genBtn" class="btn-image">Generate image</button>

      <label>Generated image</label>
      <div id="imageOutput" class="img-wrap">Your image will appear here.</div>
    </section>
  </div>

  <footer>Built with FastAPI · Groq · Gemini</footer>

  <script>
    const api = (path) => path; // same-origin

    // --- Populate dropdowns ---
    async function loadModels() {
      try {
        const res = await fetch(api("/api/models"));
        const data = await res.json();
        const textSel = document.getElementById("textModel");
        const imgSel = document.getElementById("imageModel");
        data.text_models.forEach(m => textSel.add(new Option(m, m)));
        data.image_models.forEach(m => imgSel.add(new Option(m, m)));
      } catch (e) {
        console.error("Failed to load models", e);
      }
    }

    // --- Chat ---
    const sendBtn = document.getElementById("sendBtn");
    sendBtn.addEventListener("click", async () => {
      const userMessage = document.getElementById("userMessage").value.trim();
      const out = document.getElementById("chatOutput");
      if (!userMessage) {
        out.className = "output err";
        out.textContent = "Please enter a message.";
        return;
      }
      sendBtn.disabled = true;
      out.className = "output";
      out.innerHTML = '<span class="spinner"></span> Thinking...';
      try {
        const res = await fetch(api("/api/chat"), {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({
            model: document.getElementById("textModel").value,
            system_prompt: document.getElementById("systemPrompt").value,
            user_message: userMessage,
          }),
        });
        const data = await res.json();
        if (!res.ok) throw new Error(data.detail || "Request failed");
        out.className = "output";
        out.textContent = data.response;
      } catch (e) {
        out.className = "output err";
        out.textContent = "Error: " + e.message;
      } finally {
        sendBtn.disabled = false;
      }
    });

    // --- Image ---
    const genBtn = document.getElementById("genBtn");
    genBtn.addEventListener("click", async () => {
      const prompt = document.getElementById("imagePrompt").value.trim();
      const out = document.getElementById("imageOutput");
      if (!prompt) {
        out.className = "img-wrap err";
        out.textContent = "Please enter an image prompt.";
        return;
      }
      genBtn.disabled = true;
      out.className = "img-wrap";
      out.innerHTML = '<span class="spinner"></span> Generating...';
      try {
        const res = await fetch(api("/api/generate-image"), {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({
            model: document.getElementById("imageModel").value,
            prompt: prompt,
          }),
        });
        const data = await res.json();
        if (!res.ok) throw new Error(data.detail || "Request failed");
        out.className = "img-wrap";
        out.innerHTML =
          `<img src="data:${data.mime_type};base64,${data.image_base64}" alt="generated image" />`;
      } catch (e) {
        out.className = "img-wrap err";
        out.textContent = "Error: " + e.message;
      } finally {
        genBtn.disabled = false;
      }
    });

    loadModels();
  </script>
</body>
</html>
